# GitHub Actions workflow for executing Jupyter notebooks
# Runs on pull requests and nightly to ensure notebooks work correctly

name: Notebooks

on:
  push:
    branches: [main, master]
    paths:
      - 'notebooks/**'
      - 'boxcrete/**'
      - 'pyproject.toml'
      - '.github/workflows/notebooks.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'notebooks/**'
      - 'boxcrete/**'
      - 'pyproject.toml'
      - '.github/workflows/notebooks.yml'
  schedule:
    # Run nightly at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  # Notebooks that use BOXCRETE_OPTIMIZATION_MODE run in both mortar and concrete modes
  mode-dependent-notebooks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        optimization-mode: ['mortar', 'concrete']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.10-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.10-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[notebooks]"

      - name: Install Jupyter kernel
        run: |
          python -m ipykernel install --user --name python3

      - name: Execute mode-dependent notebooks (${{ matrix.optimization-mode }})
        env:
          BOXCRETE_OPTIMIZATION_MODE: ${{ matrix.optimization-mode }}
        run: |
          python - << 'PYEOF'
          import subprocess, sys, os
          from pathlib import Path

          # Only notebooks that use BOXCRETE_OPTIMIZATION_MODE
          MODE_DEPENDENT = [
              "notebooks/prediction_and_optimization_tutorial.ipynb",
          ]

          mode = os.environ.get("BOXCRETE_OPTIMIZATION_MODE", "concrete")
          failed = []

          for nb in MODE_DEPENDENT:
              nb_path = Path(nb)
              if not nb_path.exists():
                  print(f"⚠️  Skipping (not found): {nb}")
                  continue

              print(f"{'=' * 40}")
              print(f"Executing ({mode}): {nb}")
              print(f"{'=' * 40}")

              result = subprocess.run(
                  [
                      sys.executable, "-m", "jupyter", "nbconvert",
                      "--to", "notebook",
                      "--execute",
                      "--inplace",
                      "--ExecutePreprocessor.timeout=600",
                      "--ExecutePreprocessor.kernel_name=python3",
                      str(nb),
                  ],
                  capture_output=False,
              )

              if result.returncode != 0:
                  failed.append(str(nb))
                  print(f"❌ Failed ({mode}): {nb}")
              else:
                  print(f"✅ Successfully executed ({mode}): {nb}")
              print()

          if failed:
              print(f"\n{len(failed)} notebook(s) failed in {mode} mode:")
              for f in failed:
                  print(f"  - {f}")
              sys.exit(1)
          PYEOF

      - name: Upload executed notebooks as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notebooks-mode-${{ matrix.optimization-mode }}
          path: notebooks/prediction_and_optimization_tutorial.ipynb
          retention-days: 7

  # Notebooks that don't depend on optimization mode run once
  mode-independent-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.10-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.10-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[notebooks]"

      - name: Install Jupyter kernel
        run: |
          python -m ipykernel install --user --name python3

      - name: Execute mode-independent notebooks
        run: |
          python - << 'PYEOF'
          import subprocess, sys
          from pathlib import Path

          # Notebooks that don't use BOXCRETE_OPTIMIZATION_MODE
          MODE_DEPENDENT = {
              "prediction_and_optimization_tutorial.ipynb",
          }

          notebooks = sorted(
              nb for nb in Path("notebooks").glob("*.ipynb")
              if nb.name not in MODE_DEPENDENT
          )
          failed = []

          for nb in notebooks:
              print(f"{'=' * 40}")
              print(f"Executing: {nb}")
              print(f"{'=' * 40}")

              result = subprocess.run(
                  [
                      sys.executable, "-m", "jupyter", "nbconvert",
                      "--to", "notebook",
                      "--execute",
                      "--inplace",
                      "--ExecutePreprocessor.timeout=600",
                      "--ExecutePreprocessor.kernel_name=python3",
                      str(nb),
                  ],
                  capture_output=False,
              )

              if result.returncode != 0:
                  failed.append(str(nb))
                  print(f"❌ Failed: {nb}")
              else:
                  print(f"✅ Successfully executed: {nb}")
              print()

          if failed:
              print(f"\n{len(failed)} notebook(s) failed:")
              for f in failed:
                  print(f"  - {f}")
              sys.exit(1)
          else:
              print(f"\nAll {len(notebooks)} notebook(s) executed successfully.")
          PYEOF

      - name: Upload executed notebooks as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notebooks-independent
          path: notebooks/*.ipynb
          retention-days: 7

  notebook-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nbformat

      - name: Validate notebook format
        run: |
          python - << 'EOF'
          import nbformat
          import sys
          from pathlib import Path

          notebooks = list(Path('notebooks').glob('*.ipynb'))
          errors = []

          for nb_path in notebooks:
              try:
                  with open(nb_path, 'r', encoding='utf-8') as f:
                      nb = nbformat.read(f, as_version=4)
                  print(f"✅ Valid notebook: {nb_path}")
              except Exception as e:
                  errors.append(f"❌ Invalid notebook {nb_path}: {e}")
                  print(errors[-1])

          if errors:
              print(f"\n{len(errors)} notebook(s) failed validation.")
              sys.exit(1)
          else:
              print(f"\nAll {len(notebooks)} notebook(s) are valid.")
          EOF
